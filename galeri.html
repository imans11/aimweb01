<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Saya</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', }
    </script>
</head>

<body class="bg-gray-100 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300 min-h-screen flex flex-col">

    <header class="bg-green-500 dark:bg-green-700 text-white p-8 flex flex-col items-center">
        <h1 class="text-3xl font-bold mb-2">Galeri Foto Saya</h1>
        <p class="mb-4">Kumpulan momen atau proyek yang sedang saya kerjakan.</p>
        
        <nav class="space-x-6 mt-2">
            <a href="index.html" class="hover:text-gray-300">Beranda</a>
            <a href="galeri.html" class="font-bold underline hover:text-gray-300">Galeri</a>
            <a href="kontak.html" class="hover:text-gray-300">Kontak</a>
        </nav>
    </header>

    <main class="flex-1 w-11/12 max-w-3xl mx-auto my-8 p-6 bg-white dark:bg-gray-800 rounded-lg shadow-lg">
        <section class="mb-6">
            <h2 class="text-2xl font-bold mb-2 border-b-2 border-green-500 pb-2">Proyek Web Pertama</h2>
            <p class="mt-2">Ini adalah halaman galeri. Karena kita sudah memasang skrip LocalStorage di halaman ini, mode gelap akan otomatis mengikuti pilihan terakhirmu!</p>
        </section>
    </main>

    <footer class="bg-gray-800 dark:bg-gray-950 text-white text-center p-4 mt-auto">
        <p>&copy; 2026 Dibuat oleh Saya</p>
    </footer>

    <!-- Skrip ini yang membuat halaman langsung mengecek memori Dark Mode -->
    <script>
        if (localStorage.getItem('tema') === 'gelap') {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
